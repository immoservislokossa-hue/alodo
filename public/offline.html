<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALODO - Mode Hors Ligne</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: linear-gradient(135deg, #008751 0%, #00aa66 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #f0f9ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            color: #1a3c6b;
            font-size: 28px;
            margin-bottom: 12px;
        }

        p {
            color: #64748b;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .info {
            background: #f0fdf4;
            border-left: 4px solid #008751;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            text-align: left;
            font-size: 14px;
            color: #166534;
        }

        .info strong {
            display: block;
            margin-bottom: 8px;
            color: #065f46;
        }

        button {
            background: linear-gradient(135deg, #008751 0%, #00aa66 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 135, 81, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #0f172a;
            }

            .container {
                background: #1e293b;
                color: #e2e8f0;
            }

            h1 {
                color: #e2e8f0;
            }

            p {
                color: #cbd5e1;
            }

            .info {
                background: #064e3b;
                color: #d1fae5;
            }

            .info strong {
                color: #a7f3d0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Mode Hors Ligne</h1>
        <p>Vous n'êtes pas connecté à Internet pour le moment.</p>

        <div class="info">
            <strong>💡 Conseil:</strong>
            <p>Les données en cache seront disponibles dès que la connexion sera rétablie.</p>
        </div>

        <button onclick="location.reload()">Réessayer la connexion</button>
    </div>

    <script>
        // Listen for online event
        window.addEventListener('online', () => {
            document.querySelector('p').textContent = 'Votre connexion est rétablie!'
            document.querySelector('button').textContent = 'Continuer vers l\'application'
            document.querySelector('button').onclick = () => location.href = '/'
        })
    </script>
</body>
</html>
